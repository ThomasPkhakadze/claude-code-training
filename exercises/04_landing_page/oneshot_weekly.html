<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Snapshot -- March 23-29, 2026 | MARTIVI DIGITAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── CSS Variables ── */
        :root {
            --bg-dark: #191919;
            --bg-card: #262626;
            --bg-card-alt: #1e1e1e;
            --primary: #ffc711;
            --secondary: #3cc5ee;
            --text: #ffffff;
            --text-muted: #888888;
            --text-dim: #555555;
            --border: #333333;
            --grid-line: #2a2a2a;
        }

        /* ── Reset & Base ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
        }

        /* ── Slide Layout ── */
        .slide {
            min-height: 100vh;
            padding: clamp(30px, 5vw, 60px);
            border-bottom: 3px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ── Title Slide ── */
        .title-slide {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 50%, var(--bg-dark) 100%);
            overflow: hidden;
        }

        .title-slide::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.04;
            border-radius: 50%;
        }

        .title-slide h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .title-slide .accent { color: var(--primary); }

        .title-slide .subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text-muted);
            font-weight: 400;
        }

        .title-slide .period {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: var(--secondary);
            margin-top: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── Section Header ── */
        .section-label {
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .section-title {
            font-size: clamp(1.3rem, 2.5vw, 2rem);
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px 24px;
            border-left: 4px solid var(--primary);
        }

        .stat-card.cyan { border-left-color: var(--secondary); }

        .stat-card .label {
            font-size: clamp(0.75rem, 1.2vw, 0.9rem);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
        }

        /* ── Charts ── */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            flex: 1;
        }

        .chart-container {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .chart-container h3 {
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .chart-container canvas {
            max-height: 300px;
        }

        /* ── Footer ── */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 clamp(30px, 5vw, 60px);
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            color: var(--text-dim);
        }

        .footer .brand span:first-child {
            color: var(--primary);
            font-weight: 700;
        }

        .footer .brand span:last-child {
            color: var(--secondary);
            font-weight: 300;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            .slide { padding: clamp(16px, 4vw, 30px); }
            .footer { padding: 0 clamp(16px, 4vw, 30px); font-size: clamp(0.75rem, 2vw, 0.85rem); bottom: 12px; }
        }

        /* ── Print ── */
        @media print {
            .slide {
                page-break-after: always;
                min-height: auto;
                padding: 40px;
            }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<!-- ════════ SLIDE 1: Title ════════ -->
<div class="slide title-slide">
    <h1>Weekly <span class="accent">Snapshot</span></h1>
    <p class="subtitle">Social Media Performance</p>
    <p class="period">March 23 -- 29, 2026</p>
    <div class="footer">
        <span>1 / 2</span>
        <span class="brand"><span>MARTIVI </span><span>DIGITAL</span></span>
    </div>
</div>

<!-- ════════ SLIDE 2: Dashboard ════════ -->
<div class="slide">
    <p class="section-label">Performance</p>
    <h2 class="section-title">Weekly Overview</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">Posts Published</div>
            <div class="value">12</div>
        </div>
        <div class="stat-card cyan">
            <div class="label">Total Reach</div>
            <div class="value">18.5K</div>
        </div>
        <div class="stat-card">
            <div class="label">Engagement Rate</div>
            <div class="value">4.2%</div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-container">
            <h3>Daily Reach (Mon -- Sun)</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>Content Type Split</h3>
            <canvas id="doughnutChart"></canvas>
        </div>
    </div>

    <div class="footer">
        <span>2 / 2</span>
        <span class="brand"><span>MARTIVI </span><span>DIGITAL</span></span>
    </div>
</div>

<script>
    // ── Read CSS Variables for Charts ──
    const rootStyles = getComputedStyle(document.documentElement);
    const primary = rootStyles.getPropertyValue('--primary').trim();
    const secondary = rootStyles.getPropertyValue('--secondary').trim();
    const textMuted = rootStyles.getPropertyValue('--text-muted').trim();
    const border = rootStyles.getPropertyValue('--border').trim();
    const gridLine = rootStyles.getPropertyValue('--grid-line').trim();

    // ── Chart Defaults ──
    Chart.defaults.color = textMuted;
    Chart.defaults.borderColor = border;

    // ── Bar Chart: Daily Reach ──
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
                label: 'Reach',
                data: [2100, 2800, 3200, 1900, 2500, 3800, 2200],
                backgroundColor: primary,
                borderRadius: 6,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { grid: { display: false } },
                y: {
                    grid: { color: gridLine },
                    ticks: { callback: v => (v / 1000).toFixed(1) + 'K' }
                }
            }
        }
    });

    // ── Doughnut Chart: Content Type Split ──
    new Chart(document.getElementById('doughnutChart'), {
        type: 'doughnut',
        data: {
            labels: ['Reels', 'Stories', 'Posts'],
            datasets: [{
                data: [45, 30, 25],
                backgroundColor: [primary, secondary, '#845ef7'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        usePointStyle: true,
                        pointStyle: 'circle',
                        padding: 20
                    }
                },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.label + ': ' + ctx.parsed + '%'
                    }
                }
            }
        }
    });
</script>

</body>
</html>
